spring:

  profiles:
    active: prod

  application:
    name: inventory-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/inventory}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:admin}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate.format_sql: true

server:
  port: ${SERVER_PORT:8080}

app:
  clients:
    menu-service:
      url: ${MENU_SERVICE_URL:http://localhost:8082}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    topics:
      purchase-event: PURCHASE_EVENT
      invoice-event: INVOICE_EVENT
      stock-event: STOCK_EVENT
    groups:
      inventory-group: inventory-group-consumer




eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_DEFAULT_ZONE:http://eureka-service:8761/eureka}
    register-with-eureka: true
    fetch-registry: false