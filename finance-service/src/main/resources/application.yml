spring:


  datasource:
    url: jdbc:postgresql://localhost:5432/finance
    username: postgres
    password: admin

  jpa:
    hibernate:
      ddl-auto: update
      show-sql: true
    properties:
      hibernate.format_sql: true

server:
  port: 8081

app:
  kafka:
    bootstrap-servers: localhost:9092
    topics:
      purchase-event: PURCHASE_EVENT
    groups:
      finance-group: finance-group-consumer