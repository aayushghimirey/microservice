spring:

  application:
    name: menu-service

  datasource:
    url: jdbc:postgresql://localhost:5432/menu
    username: postgres
    password: admin

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true



server:
  port: 8082


# Custom application properties
app:
  clients:
    inventory-service:
      url: http://localhost:8080

logging:
  level:
    com.sts: DEBUG
    org.hibernate.SQL: DEBUG
