spring:

  datasource:
    url: jdbc:postgresql://localhost:5432/orders
    username: postgres
    password: admin

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate.format_sql: true

server:
  port: 8083

app:
  kafka:
    bootstrap-servers: localhost:9092
    topics:
      order-event: ORDER_EVENT
  clients:
    menu-service:
      url: http://localhost:8082

