services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.9.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeperdata:/var/lib/zookeeper/data
    healthcheck:
      test: [ "CMD", "nc", "-z", "localhost", "2181" ]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.9.1
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    volumes:
      - kafkadata:/var/lib/kafka/data
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
      - "29092:29092"
    healthcheck:
      test: [ "CMD-SHELL", "nc -z localhost 9092 || exit 1" ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 45s

  eureka-service:
    build:
      context: .
      args:
        SERVICE_NAME: eureka-service
    container_name: eureka-service
    ports:
      - "8761:8761"
    environment:
      SERVER_PORT: 8761
    healthcheck: # 👈 was missing
      test: [ "CMD", "curl", "-f", "http://localhost:8761/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  inventory-service:
    build:
      context: .
      args:
        SERVICE_NAME: inventory-service
    container_name: inventory-service
    ports:
      - "8000:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/inventory
      SPRING_DATASOURCE_USERNAME: app_user
      SPRING_DATASOURCE_PASSWORD: AppUser@1234
      GATEWAY_SECRET: sts@123_gateway_pass_#$%^&*validated_by_aayush+ghimire077@something.sts.com.test&&%secret
      FLYWAY_USER: postgres
      FLYWAY_PASSWORD: admin
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_DEFAULT_ZONE: http://eureka-service:8761/eureka
      SERVER_PORT: 8080
      MENU_SERVICE_URL: http://menu-service:8080
      PURCHASE_EVENT: PURCHASE_EVENT
      INVOICE_EVENT: INVOICE_EVENT
      STOCK_EVENT: STOCK_EVENT
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy       # 👈 was service_started
      eureka-service:
        condition: service_healthy       # 👈 was service_started

  auth-service:
    build:
      context: .
      args:
        SERVICE_NAME: auth-service
    container_name: auth-service
    ports:
      - "8007:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: admin
      FLYWAY_USER: postgres
      FLYWAY_PASSWORD: admin
      SERVER_PORT: 8080
      EUREKA_CLIENT_DEFAULT_ZONE: http://eureka-service:8761/eureka

    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy       # 👈 was service_started
      eureka-service:
        condition: service_healthy       # 👈 was service_started

  finance-service:
    build:
      context: .
      args:
        SERVICE_NAME: finance-service

    container_name: finance-service
    ports:
      - "8001:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/finance
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: admin

      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_DEFAULT_ZONE: http://eureka-service:8761/eureka
      GATEWAY_SECRET: sts@123_gateway_pass_#$%^&*validated_by_aayush+ghimire077@something.sts.com.test&&%secret

      PURCHASE_EVENT: PURCHASE_EVENT
      INVOICE_EVENT: INVOICE_EVENT

      FLYWAY_USERNAME: postgres
      FLYWAY_PASSWORD: admin
      SERVER_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy       # 👈 was service_started
      eureka-service:
        condition: service_healthy       # 👈 was service_started

  menu-service:
    build:
      context: .
      args:
        SERVICE_NAME: menu-service
    container_name: menu-service
    ports:
      - "8002:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/menu
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: admin
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      FLYWAY_USER: postgres
      FLYWAY_PASSWORD: admin
      EUREKA_CLIENT_DEFAULT_ZONE: http://eureka-service:8761/eureka
      SERVER_PORT: 8080
      GATEWAY_SECRET: sts@123_gateway_pass_#$%^&*validated_by_aayush+ghimire077@something.sts.com.test&&%secret
      STOCK_EVENT: STOCK_EVENT
      INVENTORY_SERVICE_URL: http://inventory-service:8080
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy       # 👈 was service_started
      eureka-service:
        condition: service_healthy       # 👈 was service_started

  order-service:
    build:
      context: .
      args:
        SERVICE_NAME: order-service
    container_name: order-service
    ports:
      - "8003:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/orders
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: admin
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      FLYWAY_USER: postgres
      FLYWAY_PASSWORD: admin
      EUREKA_CLIENT_DEFAULT_ZONE: http://eureka-service:8761/eureka
      SERVER_PORT: 8080
      MENU_SERVICE_URL: http://menu-service:8080
      GATEWAY_SECRET: sts@123_gateway_pass_#$%^&*validated_by_aayush+ghimire077@something.sts.com.test&&%secret

      ORDER_EVENT: ORDER_EVENT
      INVOICE_EVENT: INVOICE_EVENT
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-service:
        condition: service_healthy       # 👈 was service_started

  invoice-service:
    build:
      context: .
      args:
        SERVICE_NAME: invoice-service
    container_name: invoice-service
    ports:
      - "8004:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/invoice
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: admin
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      FLYWAY_USER: postgres
      FLYWAY_PASSWORD: admin
      EUREKA_CLIENT_DEFAULT_ZONE: http://eureka-service:8761/eureka
      SERVER_PORT: 8080
      MENU_SERVICE_URL: http://menu-service:8080
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy       # 👈 was service_started
      eureka-service:
        condition: service_healthy       # 👈 was service_started

  api-gateway:
    build:
      context: .
      args:
        SERVICE_NAME: api-gateway
    container_name: api-gateway
    ports:
      - "9000:8080"
    environment:
      SERVER_PORT: 8080
      EUREKA_CLIENT_DEFAULT_ZONE: http://eureka-service:8761/eureka
    depends_on:
      eureka-service:
        condition: service_healthy       # 👈 was service_started

volumes:
  pgdata:
  kafkadata:
  zookeeperdata: